<!DOCTYPE html>
<html>
<head>
    <title>Car Price Prediction</title>
</head>
<body>

    <h2>Used Car Price Prediction</h2>

    <form action="/predict" method="POST">

        <input type="number" name="vehicle_age" placeholder="Vehicle Age" required><br><br>

        <input type="number" name="km_driven" placeholder="KM Driven" required><br><br>

        <input type="number" step="0.01" name="mileage" placeholder="Mileage" required><br><br>

        <input type="number" name="engine" placeholder="Engine CC" required><br><br>

        <input type="number" step="0.01" name="max_power" placeholder="Max Power" required><br><br>

        <input type="number" name="seats" placeholder="Seats" required><br><br>

        <select name="seller_type">
            <option value="Dealer">Dealer</option>
            <option value="Individual">Individual</option>
            <option value="Trustmark Dealer">Trustmark Dealer</option>
        </select>
        <br><br>

        <select name="fuel_type">
            <option value="CNG">CNG</option>
            <option value="Diesel">Diesel</option>
            <option value="LPG">LPG</option>
            <option value="Petrol">Petrol</option>
        </select>
        <br><br>

        <select name="transmission_type">
            <option value="Automatic">Automatic</option>
            <option value="Manual">Manual</option>
        </select>
        <br><br>

        <button type="submit">Predict Price</button>

    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
